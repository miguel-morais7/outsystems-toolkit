<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutSystems Reactive Toolkit</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>

<body>
  <!-- ============================================================ -->
  <!--  HEADER                                                       -->
  <!-- ============================================================ -->
  <header class="header">
    <div class="header-top">
      <h1 class="header-title">
        <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        OutSystems Reactive Toolkit
      </h1>
      <div class="header-actions">
        <button id="btn-scan" class="btn btn-primary" title="Scan for client variables">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Scan
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================ -->
  <!--  STATUS BAR                                                   -->
  <!-- ============================================================ -->
  <div id="status-bar" class="status-bar hidden">
    <span id="status-text"></span>
  </div>

  <!-- ============================================================ -->
  <!--  MAIN CONTENT                                                 -->
  <!-- ============================================================ -->
  <main id="main-content" class="main-content">
    <!-- Empty state (shown before first scan) -->
    <div id="empty-state" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <p>Click <strong>Scan</strong> to discover client variables, producers, screens, static entities, and roles on this page.</p>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Scanning modules…</p>
    </div>

    <!-- App Metadata (populated dynamically) -->
    <div id="metadata-section" class="section hidden">
      <div class="section-header" data-section="appmetadata">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">App Metadata</span>
        <span id="metadata-count" class="section-count">0</span>
      </div>
      <div id="metadata-list" class="var-list"></div>
    </div>

    <!-- Variable list (populated dynamically) -->
    <div id="var-section" class="section hidden">
      <div class="section-header" data-section="variables">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Client Variables</span>
        <span id="var-count" class="section-count">0</span>
      </div>
      <!-- Search / Filter bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search" type="text" placeholder="Search variables…" autocomplete="off" />
          <select id="select-module" title="Filter by module">
            <option value="">All Modules</option>
          </select>
        </div>
      </div>
      <div id="var-list" class="var-list"></div>
    </div>

    <!-- Screen list (populated dynamically) -->
    <div id="screen-section" class="section hidden">
      <div class="section-header" data-section="screens">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Screens</span>
        <span id="screen-count" class="section-count">0</span>
      </div>
      <!-- Screen search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-screens" type="text" placeholder="Search screens…" autocomplete="off" />
        </div>
      </div>
      <div id="screen-list" class="var-list"></div>
    </div>

    <!-- Block list (populated dynamically) -->
    <div id="block-section" class="section hidden">
      <div class="section-header" data-section="blocks">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Blocks</span>
        <span id="block-count" class="section-count">0</span>
      </div>
      <!-- Block search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-blocks" type="text" placeholder="Search blocks…" autocomplete="off" />
        </div>
      </div>
      <div id="block-list" class="var-list"></div>
    </div>

    <!-- Built-in Functions (populated dynamically) -->
    <div id="builtin-section" class="section hidden">
      <div class="section-header" data-section="builtinFunctions">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Built-in Functions</span>
        <span id="builtin-count" class="section-count">0</span>
      </div>
      <div id="builtin-list" class="var-list"></div>
    </div>

    <!-- Static Entities list (populated dynamically) -->
    <div id="static-entity-section" class="section hidden">
      <div class="section-header" data-section="staticEntities">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Static Entities</span>
        <span id="static-entity-count" class="section-count">0</span>
      </div>
      <!-- Static Entity search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-static-entities" type="text" placeholder="Search records…" autocomplete="off" />
          <select id="select-static-entity-module" title="Filter by module">
            <option value="">All Modules</option>
          </select>
        </div>
      </div>
      <div id="static-entity-list" class="var-list"></div>
    </div>

    <!-- Entities & Structures list (populated dynamically) -->
    <div id="data-model-section" class="section hidden">
      <div class="section-header" data-section="dataModels">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Entities &amp; Structures
          <span class="info-hint" data-tooltip="Identification of entities and structures is based on heuristics and may not be 100% accurate.">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
          </span>
        </span>
        <span id="data-model-count" class="section-count">0</span>
      </div>
      <!-- Data model search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-data-models" type="text" placeholder="Search entities &amp; structures…" autocomplete="off" />
          <select id="select-data-model-module" title="Filter by module">
            <option value="">All Modules</option>
          </select>
          <select id="select-data-model-kind" title="Filter by type">
            <option value="">All Types</option>
            <option value="Entity">Entities</option>
            <option value="Structure">Structures</option>
          </select>
        </div>
      </div>
      <div id="data-model-list" class="var-list"></div>
    </div>

    <!-- Role list (populated dynamically) -->
    <div id="role-section" class="section hidden">
      <div class="section-header" data-section="roles">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Roles</span>
        <span id="role-count" class="section-count">0</span>
      </div>
      <!-- Role search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-roles" type="text" placeholder="Search roles…" autocomplete="off" />
        </div>
      </div>
      <div id="role-list" class="var-list"></div>
    </div>

    <!-- Producer list (populated dynamically) -->
    <div id="producer-section" class="section hidden">
      <div class="section-header" data-section="producers">
        <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
        <span class="section-title">Producers</span>
        <span id="producer-count" class="section-count">0</span>
      </div>
      <!-- Producer search bar -->
      <div class="producer-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="input-search-producers" type="text" placeholder="Search producers…" autocomplete="off" />
          <select id="select-producer-module" title="Filter by module">
            <option value="">All Modules</option>
          </select>
        </div>
      </div>
      <div id="producer-list" class="var-list"></div>
    </div>
  </main>

  <!-- ============================================================ -->
  <!--  VARIABLE POPUP OVERLAY                                       -->
  <!-- ============================================================ -->
  <div id="var-popup-overlay" class="var-popup-overlay hidden"></div>

  <!-- ============================================================ -->
  <!--  BLOCK TREE POPUP OVERLAY                                     -->
  <!-- ============================================================ -->
  <div id="block-tree-overlay" class="var-popup-overlay hidden"></div>

  <!-- ============================================================ -->
  <!--  TOAST CONTAINER                                              -->
  <!-- ============================================================ -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="sidepanel.js"></script>
</body>

</html>
